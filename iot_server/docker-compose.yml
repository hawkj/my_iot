version: '3'

services:
  emq:
    image: emqx/emqx:5.4.0
    container_name: emq
    ports:
      - "1883:1883"        # MQTT
      - "8083:8083"        # MQTT over WebSocket
      - "8883:8883"        # MQTT with TLS/SSL
      - "18083:18083"      # Dashboard
    environment:
      - EMQX_NAME=emq
      - EMQX_NODE__DIST_LISTEN_MIN=9100
      - EMQX_NODE__DIST_LISTEN_MAX=9109
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - emqx_etc:/opt/emqx/etc
    networks:
      - net_1

  kafka:
    image: bitnami/kafka:3.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_CREATE_TOPICS: "test:1:1"
    volumes:
      - kafka_data:/bitnami/kafka
      - zookeeper_data:/bitnami/zookeeper/data  # 新增的部分
    networks:
      - net_1

  zookeeper:
    image: bitnami/zookeeper:3.9.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      - net_1

networks:
  net_1:
    driver: bridge

volumes:
  emqx_data:
  emqx_log:
  emqx_etc:
  kafka_data:
  zookeeper_data:
