version: '3'

services:
  emq:
    image: emqx/emqx:5.4.0
    container_name: emq
    ports:
      - "1883:1883"        # MQTT
      - "8083:8083"        # MQTT over WebSocket
      - "8883:8883"        # MQTT with TLS/SSL
      - "18083:18083"      # Dashboard
    environment:
      - EMQX_NAME=emq
      - EMQX_NODE__DIST_LISTEN_MIN=9100
      - EMQX_NODE__DIST_LISTEN_MAX=9109
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - emqx_etc:/opt/emqx/etc

networks:
  emq_net:
    driver: bridge

volumes:
  emqx_data:
  emqx_log:
  emqx_etc:
